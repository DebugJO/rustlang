---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <!-- <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}</p> -->
    <p class="post-meta">{{ page.date | date: "%F" }} • MSJO</p>
  </header>

  <article class="post-content">
    {{ content }}
  </article>
  
  {% include comment.html %}

<div class="pagination" style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px;">
  {% if page.next %}
    <a href="{{ page.next.url | relative_url }}" class="next">PREV</a>
  {% else %}
    <span class="next" style="color: #ccc;">PREV</span>
  {% endif %}

  <span class="page_number">
    <a href="{{ '/' | relative_url }}" style="text-decoration: none; font-weight: bold;">HOME</a>
  </span>

  {% if page.previous %}
    <a href="{{ page.previous.url | relative_url }}" class="previous">NEXT</a>
  {% else %}
    <span class="previous" style="color: #ccc;">NEXT</span>
  {% endif %}
</div>

</div>
