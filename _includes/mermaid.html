<style>
  /* 1. 외부 컨테이너 */
  .mermaid {
    background-color: #FAFAFA !important;
    border: 1px solid #eee !important;
    /* border-radius: 6px !important; */
    /* padding: 10px !important; */
    margin: -8px -8px !important;
    display: flex;
    justify-content: center;
    overflow-x: auto;
  }

  /* 2. [초정밀] 선 두께 및 화살표 크기 조절 */
  /* 선 두께를 0.5px~0.8px 사이로 설정 (0.5는 너무 가늘어 안 보일 수 있음) */
  .mermaid .edgePath .path {
    stroke-width: 0.5px !important; 
    stroke: #666 !important;
  }

  /* 화살표 머리 크기 축소 및 위치 보정 */
  /* scale만 하면 화살표가 선에서 떨어지므로 translateX로 붙여줍니다. */
  .mermaid marker {
    transform: scale(0.5);
    transform-origin: left; /* 화살표 끝부분을 기준으로 축소 */
  }

  /* 3. 폰트 13px 고정 및 박스 크기 최적화 */
  .mermaid svg, .mermaid text {
    font-size: 13px !important;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
  }

  /* 박스가 너무 작아져서 글자가 겹치는 것 방지 */
  .mermaid .node rect, .mermaid .node circle, .mermaid .node polygon {
    stroke-width: 0.5px !important;
  }

  .language-mermaid { display: none; }
</style>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    securityLevel: 'loose',
    flowchart: { 
      htmlLabels: false, /* 폰트 13px 고정을 위해 필수 */
      curve: 'linear',   /* 선을 직선 위주로 하여 0.5px의 날카로움 강조 */
      padding: 15,
      nodeSpacing: 40,
      rankSpacing: 40
    },
    themeVariables: {
      fontSize: '13px',
      fontFamily: 'arial',
      nodePadding: 2,    /* 13px 폰트가 박스 테두리에 너무 붙지 않게 살짝 여백 */
      
      mainBkg: '#FFFFFF',
      canvasBackground: '#FFFFFF',
      primaryColor: '#f6f8fa',
      primaryTextColor: '#24292e',
      primaryBorderColor: '#d1d5da',
      lineColor: '#666',
      
      // 화살표 색상 명시적 지정
      arrowheadColor: '#666'
    }
  });

  document.addEventListener('DOMContentLoaded', async function () {
    const elements = document.querySelectorAll('.language-mermaid');
    
    for (let i = 0; i < elements.length; i++) {
      const el = elements[i];
      const container = el.closest('.highlighter-rouge') || el;
      const rawCode = el.innerText.trim();

      const chartDiv = document.createElement('div');
      chartDiv.className = 'mermaid';
      chartDiv.setAttribute('id', 'mermaid-' + i);
      chartDiv.textContent = rawCode;

      container.parentNode.replaceChild(chartDiv, container);
    }
    
    await mermaid.run();
  });
</script>
