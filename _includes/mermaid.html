<style>
  /* 1. 외부 컨테이너 스타일 */
  .mermaid {
    background-color: #FAFAFA !important;
    border: 1px solid #eee !important;
    /* border-radius: 6px !important; */
    /* padding: 10px !important; */
    margin: -8px -8px !important;
    display: flex;
    justify-content: center;
    overflow-x: auto;
  }

  /* 2. [핵심] 폰트 크기 강제 고정 (SVG 내부 모든 텍스트) */
  .mermaid svg, 
  .mermaid svg * {
    font-size: 13px !important;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
  }

  /* 3. [핵심] 화살표(Arrowhead) 크기 축소 */
  /* Mermaid의 화살표는 marker-end로 생성되므로 크기를 강제로 줄입니다. */
  .mermaid .marker {
    transform: scale(0.7); /* 화살표 크기를 70%로 축소 */
  }
  
  /* 선 두께도 살짝 가늘게 하여 화살표와 조화롭게 만듦 */
  .mermaid .edgePath .path {
    stroke-width: 0.5px !important;
  }

  .language-mermaid { display: none; }
</style>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    securityLevel: 'loose',
    // [중요] htmlLabels를 false로 해야 폰트 크기가 SVG 규칙에 따라 엄격하게 적용됩니다.
    flowchart: { 
      htmlLabels: false, 
      useMaxWidth: true,
      curve: 'linear',
      padding: 10,
      nodeSpacing: 30,
      rankSpacing: 30
    },
    themeVariables: {
      /* Base 테마 설정 */
      fontSize: '13px',
      fontFamily: 'arial',
      
      // 박스 내부 여백 최소화
      nodePadding: 4, 

      mainBkg: '#FFFFFF',
      canvasBackground: '#FFFFFF',
      primaryColor: '#f6f8fa',
      primaryTextColor: '#24292e',
      primaryBorderColor: '#d1d5da',
      lineColor: '#666',      /* 선 색상을 살짝 진하게 하여 가늘어도 잘 보이게 함 */
      secondaryColor: '#0366d6',
      tertiaryColor: '#f1f8ff'
    }
  });

  document.addEventListener('DOMContentLoaded', async function () {
    const elements = document.querySelectorAll('.language-mermaid');
    
    for (let i = 0; i < elements.length; i++) {
      const el = elements[i];
      const container = el.closest('.highlighter-rouge') || el;
      const rawCode = el.innerText.trim();

      const chartDiv = document.createElement('div');
      chartDiv.className = 'mermaid';
      chartDiv.setAttribute('id', 'mermaid-' + i);
      chartDiv.textContent = rawCode;

      container.parentNode.replaceChild(chartDiv, container);
    }
    
    // 렌더링 시작
    await mermaid.run();
  });
</script>
