<style>
  /* 1. Jekyll 테마의 코드 블록 스타일이 Mermaid에 영향을 주지 않도록 초기화 */
  .mermaid {
    background-color: transparent !important; /* 배경 투명하게 */
    border: none !important;                 /* 테두리 제거 */
    padding: 0 !important;                  /* 여백 제거 */
    line-height: normal !important;          /* 줄간격 초기화 */
    margin: 1.5rem 0 !important;            /* 위아래 간격만 살짝 줌 */
    text-align: center;                     /* 다이어그램 중앙 정렬 */
  }

  /* 2. (선택사항) 만약 다크모드 테마를 쓰신다면 다이어그램 글자가 안 보일 수 있으니 
     배경을 흰색으로 강제하고 싶을 때만 아래 주석을 해제하세요. */
  /*
  .mermaid svg {
    background-color: white !important;
    border-radius: 8px;
    padding: 10px;
  }
  */
</style>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  document.addEventListener('DOMContentLoaded', function () {
    // .language-mermaid 클래스를 가진 모든 요소를 찾음 (Jekyll이 생성한 블록)
    const codeBlocks = document.querySelectorAll('.language-mermaid');

    codeBlocks.forEach(function (block) {
      // 1. 순수 텍스트(다이어그램 코드) 추출
      const rawCode = block.innerText;
      
      // 2. 새로운 깔끔한 DIV 생성
      const mermaidDiv = document.createElement('div');
      mermaidDiv.className = 'mermaid';
      mermaidDiv.textContent = rawCode;

      // 3. 기존의 복잡한 하이라이트 컨테이너 찾기
      // 보통 .highlighter-rouge가 가장 바깥쪽 감싸는 태그입니다.
      const container = block.closest('.highlighter-rouge') || block;

      // 4. 기존 컨테이너를 새 DIV로 완전히 교체 (기존 다크 배경 스타일 제거)
      container.parentNode.replaceChild(mermaidDiv, container);
    });

    // 5. Mermaid 실행
    mermaid.initialize({ 
      startOnLoad: true,
      theme: 'default', // 블로그가 어두운 테마라면 'dark'로 변경해 보세요.
      securityLevel: 'loose'
    });
  });
</script>
