<style>
  /* 1. 외부 컨테이너 스타일 (기존 코드 블록과 동일하게) */
  .mermaid {
    background-color: #282c34 !important; /* 배경색 통일 */
    border-radius: 4px;                  /* 약간의 라운딩 */
    padding: 0px 0 !important;         /* 위아래 여백 타이트하게 15px, 1rem 0 */
    margin: 0 0;
    display: flex;
    justify-content: center;
    overflow-x: auto;
    /* 폰트 크기 강제 고정 */
    font-size: 13px !important;
  }

  /* 2. Mermaid 내부 텍스트 폰트 크기 강제 적용 */
  .mermaid svg {
    font-size: 13px !important;
    font-family: 'Cascadia Code', 'Source Code Pro', 'Menlo', monospace !important;
  }

  /* 로딩 전 텍스트 숨김 */
  .language-mermaid {
    display: none;
  }
</style>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  // Mermaid 상세 설정
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    securityLevel: 'loose',
    // 테마 변수 설정을 통해 내부 색상과 폰트 크기 조절
    themeVariables: {
      fontSize: '13px',            /* 텍스트 크기 13px */
      fontFamily: 'monospace',     /* 폰트 스타일 */
      
      // 배경색 및 노드 색상 설정
      primaryColor: '#3e4451',     /* 노드 배경색 (배경보다 약간 밝게) */
      primaryTextColor: '#abb2bf', /* 노드 글자색 */
      primaryBorderColor: '#5c6370', 
      
      lineColor: '#abb2bf',        /* 선 색상 */
      secondaryColor: '#282c34',
      tertiaryColor: '#282c34',
      
      // 메인 배경색을 요청하신 색상으로 고정
      mainBkg: '#282c34',
      canvasBackground: '#282c34'  /* 전체 캔버스 배경 */
    }
  });

  document.addEventListener('DOMContentLoaded', async function () {
    const elements = document.querySelectorAll('.language-mermaid');
    
    for (let i = 0; i < elements.length; i++) {
      const el = elements[i];
      const container = el.closest('.highlighter-rouge') || el;
      const rawCode = el.innerText.trim();

      const chartDiv = document.createElement('div');
      chartDiv.className = 'mermaid';
      chartDiv.setAttribute('id', 'mermaid-' + i);
      chartDiv.textContent = rawCode;

      container.parentNode.replaceChild(chartDiv, container);
    }
    
    // 렌더링 실행
    await mermaid.run();
  });
</script>
