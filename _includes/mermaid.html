<style>
  /* 1. 기존 테마의 pre, code 스타일이 절대 침범하지 못하도록 강제 리셋 */
  .mermaid {
    display: block;
    width: 100%;
    background: none !important;   /* 배경 제거 */
    border: none !important;       /* 테두리 제거 */
    padding: 0 !important;        /* 패딩 완전 제거 */
    margin: 10px 0 !important;    /* 위아래 간격만 최소화 */
    line-height: 1 !important;    /* 줄간격 리셋 */
    text-align: center;
  }

  /* 2. 생성된 SVG의 배경이나 외곽선도 타이트하게 조정 */
  .mermaid svg {
    max-width: 100% !important;
    height: auto !important;
    background: none !important;
  }
</style>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  document.addEventListener('DOMContentLoaded', function () {
    // .language-mermaid 클래스를 가진 요소를 찾음
    const mermaidElements = document.querySelectorAll('.language-mermaid');

    mermaidElements.forEach(function (el) {
      // 1. 가장 안쪽의 텍스트(다이어그램 코드)만 추출
      const rawCode = el.innerText.trim();
      
      // 2. 새로운 클린 DIV 생성 (pre나 code 태그 아님)
      const newDiv = document.createElement('div');
      newDiv.className = 'mermaid';
      newDiv.textContent = rawCode;

      // 3. Jekyll이 만든 가장 바깥쪽 컨테이너(.highlighter-rouge)를 찾아 통째로 교체
      // 이렇게 하면 pre, code 태그가 DOM에서 완전히 사라짐
      const container = el.closest('.highlighter-rouge');
      if (container) {
        container.parentNode.replaceChild(newDiv, container);
      } else {
        // 혹시 모르니 부모가 highlighter-rouge가 아닐 경우에도 대비
        el.parentNode.replaceChild(newDiv, el);
      }
    });

    // 4. Mermaid 초기화 (패딩 등 내부 설정 타이트하게)
    mermaid.initialize({
      startOnLoad: true,
      theme: 'dark', // 다크모드면 'dark'로 변경
      securityLevel: 'loose',
      // 다이어그램 내부 여백도 줄이고 싶다면 아래 설정 추가
      flowchart: { useMaxWidth: true, htmlLabels: true },
      sequence: { useMaxWidth: true, boxMargin: 5 },
      er: { useMaxWidth: true }
    });
  });
</script>
