<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  // 페이지 로드 후 실행
  document.addEventListener('DOMContentLoaded', function () {
    // 1. Jekyll/Rouge가 만든 복잡한 태그 찾기
    const codeBlocks = document.querySelectorAll('.language-mermaid');

    codeBlocks.forEach(function (block) {
      // 2. 그 안의 순수한 텍스트(다이어그램 코드)만 추출
      const rawCode = block.innerText;
      
      // 3. 새로운 다이어그램용 DIV 생성
      const mermaidDiv = document.createElement('div');
      mermaidDiv.className = 'mermaid';
      mermaidDiv.innerHTML = rawCode;

      // 4. 기존의 복잡한 태그를 새 DIV로 교체
      block.parentNode.insertBefore(mermaidDiv, block);
      block.style.display = 'none'; // 기존 코드 블록은 숨김
    });

    // 5. Mermaid 초기화 및 렌더링 시작
    mermaid.initialize({ 
        startOnLoad: true,
        theme: 'default',
        securityLevel: 'loose'
    });
  });
</script>
