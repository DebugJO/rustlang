<style>
  /* 1. Mermaid 컨테이너를 기존 코드 블록(pre)처럼 보이게 설정 */
  .mermaid {
    /* 기존 다크 코드 블록의 배경색과 비슷하게 설정 (테마에 맞춰 자동 조절됨) */
    background-color: #282c34 !important; /* 필요시 사용 중인 다크 배경색으로 수정 가능 */
    border-radius: 6px;                  /* 코드 블록의 둥근 모서리 유지 */
    padding: 20px 0;                     /* 다이어그램 위아래 여백 */
    margin: 1rem 0;
    display: flex;
    justify-content: center;
    overflow-x: auto;                    /* 모바일에서 잘림 방지 */
  }

  /* 2. 로딩 전 마크다운 텍스트가 잠깐 보이는 현상 방지 */
  .language-mermaid {
    display: none;
  }
</style>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  // 다크 모드 설정을 포함하여 초기화
  mermaid.initialize({
    startOnLoad: false, // 수동 제어를 위해 false
    theme: 'dark',      /* 핵심: 다크 테마 적용 */
    logLevel: 3,
    securityLevel: 'loose',
    themeVariables: {
      /* 다크 배경에 어울리도록 색상 미세 조정 (선택 사항) */
      darkMode: true,
      background: '#282c34', 
      primaryColor: '#bb86fc',
      lineColor: '#f8f8f2'
    }
  });

  document.addEventListener('DOMContentLoaded', async function () {
    const elements = document.querySelectorAll('.language-mermaid');
    
    for (let i = 0; i < elements.length; i++) {
      const el = elements[i];
      // Jekyll이 감싸고 있는 가장 바깥쪽 컨테이너 찾기
      const container = el.closest('.highlighter-rouge') || el;
      const rawCode = el.innerText.trim();

      // 새로운 div 생성
      const chartDiv = document.createElement('div');
      chartDiv.className = 'mermaid';
      chartDiv.setAttribute('id', 'mermaid-' + i);
      chartDiv.textContent = rawCode;

      // 기존 블록을 Mermaid 블록으로 교체
      container.parentNode.replaceChild(chartDiv, container);
    }
    
    // 렌더링 시작
    await mermaid.run();
  });
</script>
