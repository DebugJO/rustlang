<style>
  /* 1. 외부 컨테이너: 여백을 더 타이트하게 조정 */
  .mermaid {
    background-color: #FAFAFA !important;
    border: 1px solid #eee !important;
    /* border-radius: 6px !important;*/         /* 라운드 살짝 줄임 */
    /* padding: 10px !important; */            /* 외부 여백 20px -> 10px로 축소 */
    margin: -8px -8px !important;
    display: flex;
    justify-content: center;
    overflow-x: auto;
    font-size: 13px !important;
  }

  /* 2. SVG 내부 텍스트 및 간격 강제 제어 */
  .mermaid svg {
    font-size: 13px !important;
    max-width: 100% !important;
  }

  .language-mermaid { display: none; }
</style>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    securityLevel: 'loose',
    // 차트 종류별로 내부 간격 강제 설정
    flowchart: { 
      htmlLabels: true,
      curve: 'linear',
      padding: 10,           /* 차트 전체의 여백 축소 */
      nodeSpacing: 30,       /* 노드 간의 간격 축소 */
      rankSpacing: 30        /* 층 사이의 간격 축소 */
    },
    themeVariables: {
      fontFamily: 'arial, sans-serif',
      fontSize: '13px',

      /* [핵심] 박스 내부 여백 줄이기 */
      nodePadding: 5,        /* 박스 안쪽의 상하좌우 여백 (기본값 약 10~15) */
      
      mainBkg: '#FFFFFF',
      canvasBackground: '#FFFFFF',
      primaryColor: '#f6f8fa',
      primaryTextColor: '#24292e',
      primaryBorderColor: '#d1d5da',
      lineColor: '#444d56',
      secondaryColor: '#0366d6',
      tertiaryColor: '#f1f8ff',
      edgeLabelBackground: '#ffffff'
    }
  });

  document.addEventListener('DOMContentLoaded', async function () {
    const elements = document.querySelectorAll('.language-mermaid');
    
    for (let i = 0; i < elements.length; i++) {
      const el = elements[i];
      const container = el.closest('.highlighter-rouge') || el;
      const rawCode = el.innerText.trim();

      const chartDiv = document.createElement('div');
      chartDiv.className = 'mermaid';
      chartDiv.setAttribute('id', 'mermaid-' + i);
      chartDiv.textContent = rawCode;

      container.parentNode.replaceChild(chartDiv, container);
    }
    
    await mermaid.run();
  });
</script>
