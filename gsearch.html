	/* 1. 전체 검색어 제안 창의 기본 배경색 (FAFAFA) */
	.gsc-completion-container {
    	background-color: #FAFAFA !important;
	}

	/* 2. 각 행(td)의 기본 배경색 (투명하게 하여 컨테이너 색이 보이게 함) */
	.gsc-completion-container td {
    	background-color: transparent !important;
	}

	/* 3. 마우스 호버 및 키보드 선택 시 배경색 (eee) */
	.gsc-completion-container .gsc-completion-selected,
	.gsc-completion-container .gsc-completion-selected td {
   		background-color: #eee !important;
	}
	/* 마우스 커서를 올리는 즉시(Hover) eee 색상이 적용되도록 강제 */
	.gsc-completion-container .gsc-completion-selected,
	.gsc-completion-container td:hover {
    	background-color: #eee !important;
	}

	/* 혹시 남아있을 수 있는 구글 기본 노란색 잔상을 완전히 제거 */
	.gsc-completion-container .gsc-completion-selected td,
	.gsc-completion-container td:hover {
    	background-color: #eee !important;
	}

	/* 1. URL 및 브레드크럼(경로) 숨기기 */
	.gsc-webResult .gs-visibleUrl,
	.gsc-webResult .gs-visibleUrl-breadcrumb,
	.gsc-webResult .gs-visibleUrl-short {
    	display: none !important;
	}

	/* 2. 본문 내용(Snippet)은 살리고 내부의 '날짜'만 숨기기 */
	/* .gs-bidi-start-align 자체를 숨기면 내용이 안 나오므로 내부 날짜 클래스만 타겟팅 */
	.gsc-webResult .gs-relativePublishedDate,
	.gsc-webResult .gs-snippet .gs-date {
    	display: none !important;
	}

	.gsc-webResult .gs-bidi-start-align.gs-snippet {
    	display: block !important;
    	visibility: visible !important;
    	height: auto !important;
    	margin-top: 5px !important; /* 타이틀과의 간격 조절 */
	}
